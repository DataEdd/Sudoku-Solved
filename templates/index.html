<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Scan and solve Sudoku puzzles with your camera">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>Sudoku Solver</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/screens.css">
    <link rel="stylesheet" href="/static/css/animations.css">
</head>
<body>
    <div id="app">
        <!-- ============== Camera Screen ============== -->
        <section id="screen-camera" class="screen">
            <header class="top-bar">
                <div class="logo">
                    <span class="logo__icon">S</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn--icon" id="btn-manual" aria-label="Manual entry">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <line x1="9" y1="3" x2="9" y2="21"/>
                            <line x1="15" y1="3" x2="15" y2="21"/>
                            <line x1="3" y1="9" x2="21" y2="9"/>
                            <line x1="3" y1="15" x2="21" y2="15"/>
                        </svg>
                    </button>
                    <button class="btn--icon" id="btn-flash" aria-label="Toggle flash">
                        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 2v11h3v9l7-12h-4l4-8z"/>
                        </svg>
                    </button>
                </div>
            </header>

            <main class="viewfinder">
                <video id="camera-feed" autoplay playsinline muted></video>
                <canvas id="camera-canvas" hidden></canvas>
                <div class="viewfinder__guides">
                    <span class="corner corner--tl"></span>
                    <span class="corner corner--tr"></span>
                    <span class="corner corner--bl"></span>
                    <span class="corner corner--br"></span>
                </div>
                <p class="viewfinder__hint">Align puzzle within frame</p>
            </main>

            <footer class="bottom-bar">
                <button class="btn--icon" id="btn-gallery" aria-label="Upload from gallery">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                </button>
                <button class="btn-capture" id="btn-capture" aria-label="Capture photo">
                    <span class="btn-capture__ring"></span>
                    <span class="btn-capture__inner"></span>
                </button>
                <button class="btn--icon" id="btn-history" aria-label="View history">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </button>
                <input type="file" id="file-input" accept="image/*" hidden>
            </footer>
        </section>

        <!-- ============== Processing Screen ============== -->
        <section id="screen-processing" class="screen">
            <div class="processing">
                <div class="processing__image-container">
                    <img id="processing-image" class="processing__image" src="" alt="Captured image">
                    <svg class="processing__grid-overlay" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <!-- Grid lines animated via JS -->
                    </svg>
                </div>
                <div class="processing__status">
                    <div class="spinner"></div>
                    <p class="processing__text">Detecting grid...</p>
                </div>
            </div>
        </section>

        <!-- ============== Review Screen ============== -->
        <section id="screen-review" class="screen">
            <header class="screen-header">
                <h1 class="screen-title">Review Puzzle</h1>
                <p class="screen-subtitle">Tap cells to edit</p>
            </header>

            <main class="review-content">
                <div class="sudoku-container">
                    <div id="review-grid" class="sudoku-grid"></div>
                    <div class="grid-legend">
                        <span class="legend-item">
                            <span class="legend-dot legend-dot--cyan"></span> Detected
                        </span>
                    </div>
                </div>
            </main>

            <footer class="action-bar">
                <button class="btn btn--secondary" id="btn-retake">Retake</button>
                <button class="btn btn--primary" id="btn-solve">Solve</button>
            </footer>
        </section>

        <!-- ============== Solving Screen ============== -->
        <section id="screen-solving" class="screen">
            <div class="solving">
                <div class="sudoku-container solving__grid">
                    <div id="solving-grid" class="sudoku-grid"></div>
                    <div class="solving__sweep"></div>
                </div>
                <div class="solving__stats">
                    <p class="solving__counter">
                        <span id="iteration-count">0</span> iterations
                    </p>
                    <p class="solving__text">Finding solution...</p>
                </div>
            </div>
        </section>

        <!-- ============== Solution Screen ============== -->
        <section id="screen-solution" class="screen">
            <div class="success-banner">
                <svg class="success-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <h2>Puzzle Solved!</h2>
                <p id="solve-stats">Solved in 0 iterations</p>
            </div>

            <main class="solution-content">
                <div class="sudoku-container">
                    <div id="solution-grid" class="sudoku-grid"></div>
                    <div class="grid-legend">
                        <span class="legend-item">
                            <span class="legend-dot legend-dot--cyan"></span> Original
                        </span>
                        <span class="legend-item">
                            <span class="legend-dot legend-dot--green"></span> Solved
                        </span>
                    </div>
                </div>
            </main>

            <footer class="action-bar action-bar--triple">
                <button class="btn btn--secondary" id="btn-new-puzzle">
                    <svg class="icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    New
                </button>
                <button class="btn btn--secondary" id="btn-share">
                    <svg class="icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3"/>
                        <circle cx="6" cy="12" r="3"/>
                        <circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    Share
                </button>
                <button class="btn btn--secondary" id="btn-save">
                    <svg class="icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Save
                </button>
            </footer>
        </section>

        <!-- ============== History Screen ============== -->
        <section id="screen-history" class="screen">
            <header class="screen-header screen-header--with-back">
                <button class="btn--icon" id="btn-history-back" aria-label="Go back">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="screen-title">History</h1>
            </header>

            <nav class="filter-tabs">
                <button class="tab tab--active" data-filter="all">All</button>
                <button class="tab" data-filter="camera">Camera</button>
                <button class="tab" data-filter="uploaded">Uploaded</button>
                <button class="tab" data-filter="favorites">Favorites</button>
            </nav>

            <main class="history-grid" id="history-grid">
                <!-- History cards rendered via JS -->
            </main>
        </section>

        <!-- ============== Manual Entry Screen ============== -->
        <section id="screen-manual" class="screen">
            <header class="screen-header screen-header--with-back">
                <button class="btn--icon" id="btn-manual-back" aria-label="Go back">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="screen-title">Enter Puzzle</h1>
            </header>

            <main class="manual-content">
                <div class="sudoku-container">
                    <div id="manual-grid" class="sudoku-grid"></div>
                </div>

                <div class="number-pad">
                    <button class="numpad-btn" data-value="1">1</button>
                    <button class="numpad-btn" data-value="2">2</button>
                    <button class="numpad-btn" data-value="3">3</button>
                    <button class="numpad-btn" data-value="4">4</button>
                    <button class="numpad-btn" data-value="5">5</button>
                    <button class="numpad-btn" data-value="6">6</button>
                    <button class="numpad-btn" data-value="7">7</button>
                    <button class="numpad-btn" data-value="8">8</button>
                    <button class="numpad-btn" data-value="9">9</button>
                    <button class="numpad-btn numpad-btn--clear" data-value="0">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/>
                            <line x1="18" y1="9" x2="12" y2="15"/>
                            <line x1="12" y1="9" x2="18" y2="15"/>
                        </svg>
                    </button>
                </div>
            </main>

            <footer class="action-bar">
                <button class="btn btn--secondary" id="btn-clear-manual">Clear</button>
                <button class="btn btn--primary" id="btn-solve-manual">Review</button>
            </footer>
        </section>

        <!-- ============== Error Modal ============== -->
        <div id="error-modal" class="modal" hidden>
            <div class="modal__backdrop"></div>
            <div class="modal__content">
                <svg class="error-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <h2 id="error-title">Error</h2>
                <p id="error-message">Something went wrong.</p>
                <div class="modal__actions">
                    <button class="btn btn--primary" id="btn-error-dismiss">Try Again</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/history.js"></script>
    <script src="/static/js/grid.js"></script>
    <script src="/static/js/camera.js"></script>
    <script src="/static/js/screens.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>

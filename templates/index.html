<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .input-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex: 1;
            min-width: 280px;
            max-width: 400px;
        }

        .input-card h3 {
            margin-bottom: 15px;
            color: #00d4ff;
        }

        #video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            display: none;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #file-input {
            display: none;
        }

        .file-label {
            display: block;
            padding: 40px 20px;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-label:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .grid-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .grid-header h2 {
            color: #00d4ff;
        }

        .grid-actions {
            display: flex;
            gap: 10px;
        }

        .grid-actions .btn {
            width: auto;
            margin: 0;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 2px;
            background: #fff;
            padding: 4px;
            border-radius: 8px;
            max-width: 450px;
            margin: 0 auto;
        }

        .sudoku-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .sudoku-cell input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            outline: none;
        }

        .sudoku-cell input:focus {
            background: rgba(0, 212, 255, 0.2);
        }

        .sudoku-cell.fixed input {
            color: #00d4ff;
        }

        .sudoku-cell.solved input {
            color: #10b981;
        }

        /* Box borders */
        .sudoku-cell:nth-child(3n) {
            border-right: 2px solid #fff;
        }

        .sudoku-cell:nth-child(9n) {
            border-right: none;
        }

        .sudoku-cell:nth-child(n+19):nth-child(-n+27),
        .sudoku-cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #fff;
        }

        .status {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            font-weight: 500;
        }

        .status.loading {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .sudoku-cell input {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sudoku Solver</h1>

        <div class="input-section">
            <div class="input-card">
                <h3>Camera</h3>
                <div id="video-container">
                    <video id="video" autoplay playsinline></video>
                </div>
                <canvas id="canvas"></canvas>
                <button id="start-camera" class="btn btn-secondary">Start Camera</button>
                <button id="capture" class="btn btn-primary hidden">Capture</button>
            </div>

            <div class="input-card">
                <h3>Upload Image</h3>
                <label for="file-input" class="file-label">
                    <p>Click or drag to upload</p>
                    <p style="font-size: 0.9rem; opacity: 0.7; margin-top: 10px;">Supports JPG, PNG</p>
                </label>
                <input type="file" id="file-input" accept="image/*">
            </div>
        </div>

        <div class="grid-section">
            <div class="grid-header">
                <h2>Sudoku Grid</h2>
                <div class="grid-actions">
                    <button id="clear-grid" class="btn btn-secondary">Clear</button>
                    <button id="solve-btn" class="btn btn-primary">Solve</button>
                </div>
            </div>

            <div class="sudoku-grid" id="sudoku-grid"></div>

            <div id="status" class="status hidden"></div>
        </div>
    </div>

    <script>
        // Initialize grid
        const gridContainer = document.getElementById('sudoku-grid');
        const grid = [];

        function createGrid() {
            gridContainer.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                grid[i] = [];
                for (let j = 0; j < 9; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'sudoku-cell';

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.maxLength = 1;
                    input.dataset.row = i;
                    input.dataset.col = j;

                    input.addEventListener('input', (e) => {
                        const val = e.target.value;
                        if (!/^[1-9]$/.test(val)) {
                            e.target.value = '';
                        }
                    });

                    cell.appendChild(input);
                    gridContainer.appendChild(cell);
                    grid[i][j] = input;
                }
            }
        }

        function setGridValues(values, isFixed = false) {
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const val = values[i][j];
                    grid[i][j].value = val === 0 ? '' : val;
                    grid[i][j].parentElement.classList.remove('fixed', 'solved');
                    if (isFixed && val !== 0) {
                        grid[i][j].parentElement.classList.add('fixed');
                    }
                }
            }
        }

        function getGridValues() {
            const values = [];
            for (let i = 0; i < 9; i++) {
                values[i] = [];
                for (let j = 0; j < 9; j++) {
                    const val = grid[i][j].value;
                    values[i][j] = val ? parseInt(val) : 0;
                }
            }
            return values;
        }

        function clearGrid() {
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    grid[i][j].value = '';
                    grid[i][j].parentElement.classList.remove('fixed', 'solved');
                }
            }
            hideStatus();
        }

        createGrid();

        // Status display
        const statusEl = document.getElementById('status');

        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }

        function hideStatus() {
            statusEl.classList.add('hidden');
        }

        // Camera handling
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startCameraBtn = document.getElementById('start-camera');
        const captureBtn = document.getElementById('capture');

        let stream = null;

        startCameraBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
                startCameraBtn.classList.add('hidden');
                captureBtn.classList.remove('hidden');
            } catch (err) {
                showStatus('Could not access camera: ' + err.message, 'error');
            }
        });

        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            canvas.toBlob(async (blob) => {
                await processImage(blob);
            }, 'image/jpeg', 0.9);
        });

        // File upload handling
        const fileInput = document.getElementById('file-input');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                await processImage(file);
            }
        });

        // Process image (extract grid)
        async function processImage(imageBlob) {
            showStatus('Processing image...', 'loading');

            const formData = new FormData();
            formData.append('file', imageBlob);

            try {
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    setGridValues(data.grid, true);
                    showStatus('Grid extracted! Review and click Solve.', 'success');
                } else {
                    showStatus(data.message, 'error');
                }
            } catch (err) {
                showStatus('Error processing image: ' + err.message, 'error');
            }
        }

        // Solve button
        const solveBtn = document.getElementById('solve-btn');

        solveBtn.addEventListener('click', async () => {
            const values = getGridValues();

            // Mark current values as fixed
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    if (values[i][j] !== 0) {
                        grid[i][j].parentElement.classList.add('fixed');
                    }
                }
            }

            showStatus('Solving puzzle...', 'loading');
            solveBtn.disabled = true;

            try {
                const response = await fetch('/api/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ grid: values })
                });

                const data = await response.json();

                if (data.success) {
                    // Show solution with animation
                    for (let i = 0; i < 9; i++) {
                        for (let j = 0; j < 9; j++) {
                            if (values[i][j] === 0) {
                                grid[i][j].value = data.solution[i][j];
                                grid[i][j].parentElement.classList.add('solved');
                            }
                        }
                    }
                    showStatus(data.message, 'success');
                } else {
                    showStatus(data.message, 'error');
                }
            } catch (err) {
                showStatus('Error solving puzzle: ' + err.message, 'error');
            }

            solveBtn.disabled = false;
        });

        // Clear button
        document.getElementById('clear-grid').addEventListener('click', clearGrid);
    </script>
</body>
</html>
